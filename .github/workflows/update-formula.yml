name: Update formula

on:
  repository_dispatch:
    types: [formula-update]
  workflow_dispatch:
    inputs:
      formula:
        description: Formula name
        required: true
        default: cartograph

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve formula name
        id: resolve
        run: echo "formula=${{ github.event.client_payload.formula || inputs.formula || '' }}" >> "$GITHUB_OUTPUT"

      - name: Update formula
        if: steps.resolve.outputs.formula != ''
        run: python3 ./scripts/update-formula.py "${{ steps.resolve.outputs.formula }}"

      - name: Commit formula update
        run: |
          if git diff --quiet -- Formula; then
            echo "No formula changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula
          git commit -m "Update formulae"
          git push
